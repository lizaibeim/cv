---
name: Build and Publish PDF

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: |
            cv-zaibei.tex
            cv-zaibei-industry.tex

      - name: Upload PDFs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CV PDFs
          path: |
            cv-zaibei.pdf
            cv-zaibei-industry.pdf
          retention-days: 90

